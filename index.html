<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat App - OpenRouter</title>
    <style>
        /* CSS Styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .chat-container { 
            width: 90%; 
            max-width: 500px; 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; }
        .chat-box { 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            background: #fafafa;
            border-radius: 10px;
        }
        .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            outline: none;
        }
        button { 
            padding: 10px 20px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        .user-msg { 
            align-self: flex-end; 
            background: #007bff; 
            color: white; 
            padding: 8px 15px; 
            border-radius: 15px 15px 0 15px; 
            max-width: 80%;
        }
        .ai-msg { 
            align-self: flex-start; 
            background: #e9e9eb; 
            color: #333; 
            padding: 8px 15px; 
            border-radius: 15px 15px 15px 0; 
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>AI Assistant</h2>
        <div id="chat-box" class="chat-box">
            <div class="ai-msg">Hello! Main aapki kaise madad kar sakta hoon?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Yahan likhein..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // OpenRouter se mili hui API Key yahan dalein
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE"; 

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // 1. User ka message UI par dikhayein
            chatBox.innerHTML += `<div class="user-msg">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. "Thinking..." indicator
            const thinkingId = "thinking-" + Date.now();
            chatBox.innerHTML += `<div class="ai-msg" id="${thinkingId}">...</div>`;

            try {
                // 3. OpenRouter API Call
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // Optional, for OpenRouter rankings
                        "X-Title": "My AI App" 
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001", 
                        "messages": [
                            { "role": "user", "content": message }
                        ]
                    })
                });

                const data = await response.json();
                
                // 4. Response check karein
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    document.getElementById(thinkingId).innerText = aiResponse;
                } else {
                    throw new Error("Invalid response from API");
                }

            } catch (error) {
                console.error("Error:", error);
                document.getElementById(thinkingId).innerText = "Maaf kijiyega, kuch error aa gaya.";
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter key se send karne ke liye
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>

</body>
</html>
